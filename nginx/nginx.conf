# Nginx Load Balancer — TU RAG Workshop
#
# Algorithms ที่ nginx รองรับ:
#   round_robin  (default) — วนลำดับ 1→2→3→1→2→3
#   least_conn             — ส่งไปยัง server ที่มี active connections น้อยที่สุด
#   ip_hash                — client เดิม → server เดิม (sticky session)
#
# เปลี่ยน algorithm: เพิ่ม directive ใน upstream block

upstream api_cluster {
    # Docker internal DNS resolver — จำเป็นสำหรับ --scale api=N
    # เพราะ nginx resolve DNS แค่ครั้งแรก, ต้อง force re-resolve
    server api:8000;

    # Uncomment เพื่อเปลี่ยน algorithm:
    # least_conn;
    # ip_hash;

    keepalive 32;
}

server {
    listen 80;

    # Health check endpoint สำหรับ load balancer เอง
    location /nginx-health {
        access_log off;
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass         http://api_cluster;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        # Timeout สูงเพราะ LLM inference นาน
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;

        # Buffer — ลด latency สำหรับ response ขนาดเล็ก
        proxy_buffering    on;
        proxy_buffer_size  8k;
    }
}
